<body style="margin:0;background:#04070d;color:#eef8ff;font-family:system-ui;display:grid;place-items:center;min-height:100vh"><main id="boot" style="text-align:center;padding:24px"><h1>CP8 SNAKE</h1><p>Materializing verified CP8 interface…</p></main>

<script>
(async()=>{
 const canonicalSha256='6f81f022bc72d7b9d6840fd34a10f581f9e454d7b8e893190933b116c3cb75e0';
 try{
  if(!globalThis.DecompressionStream)throw new Error('Offline gzip materialization requires a current browser.');
  const raw=Uint8Array.from(atob(window.CP8_PAYLOAD.join('')),c=>c.charCodeAt(0));
  const html=await new Response(new Blob([raw]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
  document.open();document.write(html);document.close();
 }catch(e){document.querySelector('#boot').innerHTML='<h1>CP8 SNAKE</h1><p>'+e.message+'</p><p>Canonical SHA-256: <code>'+canonicalSha256+'</code></p>'}
})();
</script>
